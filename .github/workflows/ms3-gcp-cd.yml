name: MS3 GCP CD

on:
  push:
    branches:
      - main
    paths:
      - "ms3/**"
      - ".github/workflows/ms3-gcp-cd.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  GCP_REGION: ${{ vars.GCP_REGION || 'us-central1' }}
  GCP_RUN_SERVICE: ${{ vars.MS3_CLOUD_RUN_SERVICE || 'ms3-activos-fijos' }}
  MS1_GRAPHQL_URL: ${{ vars.MS1_GRAPHQL_URL }}
  MS2_BASE_URL: ${{ vars.MS2_BASE_URL }}
  SENDGRID_FROM_EMAIL: ${{ vars.SENDGRID_FROM_EMAIL || 'noreply@activos.empresa.com' }}
  MS4_N8N_WEBHOOK_URL: ${{ vars.MS4_N8N_WEBHOOK_URL }}
  EMAIL_PROVIDER: ${{ vars.EMAIL_PROVIDER || 'smtp' }}
  SMTP_HOST: ${{ vars.SMTP_HOST || 'smtp.gmail.com' }}
  SMTP_PORT: ${{ vars.SMTP_PORT || '587' }}
  SMTP_SECURE: ${{ vars.SMTP_SECURE || 'false' }}
  SMTP_USER: ${{ vars.SMTP_USER }}
  SMTP_FROM_EMAIL: ${{ vars.SMTP_FROM_EMAIL || vars.SMTP_USER }}
  WHATSAPP_PROVIDER: ${{ vars.WHATSAPP_PROVIDER || 'twilio' }}
  TWILIO_ACCOUNT_SID: ${{ vars.TWILIO_ACCOUNT_SID }}
  TWILIO_WHATSAPP_FROM: ${{ vars.TWILIO_WHATSAPP_FROM || 'whatsapp:+14155238886' }}

jobs:
  test:
    name: Test MS3
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ms3

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js 20
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ms3/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --runInBand

      - name: Build
        run: npm run build

  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: test
    environment: production
    concurrency:
      group: ms3-production
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate deployment configuration
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
          MS1_AUTH_TOKEN: ${{ secrets.MS1_AUTH_TOKEN }}
          MS2_AUTH_TOKEN: ${{ secrets.MS2_AUTH_TOKEN }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
        run: |
          test -n "$GCP_SA_KEY" || { echo "::error::GCP_SA_KEY secret is required"; exit 1; }
          test -n "$MS2_AUTH_TOKEN" || { echo "::error::MS2_AUTH_TOKEN secret is required"; exit 1; }
          test -n "$GCP_PROJECT_ID" || { echo "::error::GCP_PROJECT_ID variable is required"; exit 1; }
          test -n "$MS1_GRAPHQL_URL" || { echo "::error::MS1_GRAPHQL_URL variable is required"; exit 1; }
          test -n "$MS2_BASE_URL" || { echo "::error::MS2_BASE_URL variable is required"; exit 1; }

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy MS3 to Cloud Run
        env:
          MS2_AUTH_TOKEN: ${{ secrets.MS2_AUTH_TOKEN }}
          MS1_AUTH_TOKEN: ${{ secrets.MS1_AUTH_TOKEN }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
        run: |
          gcloud run deploy "$GCP_RUN_SERVICE" \
            --source ms3 \
            --project "$GCP_PROJECT_ID" \
            --region "$GCP_REGION" \
            --allow-unauthenticated \
            --min-instances=0 \
            --max-instances=1 \
            --cpu=1 \
            --memory=512Mi \
            --concurrency=20 \
            --timeout=60 \
            --cpu-throttling \
            --no-cpu-boost \
            --set-env-vars "NODE_ENV=production,MS3_DEV_TOOLS_ENABLED=false,MS1_GRAPHQL_URL=${MS1_GRAPHQL_URL},MS1_AUTH_TOKEN=${MS1_AUTH_TOKEN},MS2_BASE_URL=${MS2_BASE_URL},MS2_AUTH_TOKEN=${MS2_AUTH_TOKEN},MS4_N8N_WEBHOOK_URL=${MS4_N8N_WEBHOOK_URL},EMAIL_PROVIDER=${EMAIL_PROVIDER},SMTP_HOST=${SMTP_HOST},SMTP_PORT=${SMTP_PORT},SMTP_SECURE=${SMTP_SECURE},SMTP_USER=${SMTP_USER},SMTP_PASSWORD=${SMTP_PASSWORD},SMTP_FROM_EMAIL=${SMTP_FROM_EMAIL},WHATSAPP_PROVIDER=${WHATSAPP_PROVIDER},TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID},TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN},TWILIO_WHATSAPP_FROM=${TWILIO_WHATSAPP_FROM},SENDGRID_FROM_EMAIL=${SENDGRID_FROM_EMAIL}"

      - name: Show deployed URL
        id: service-url
        run: |
          gcloud run services describe "$GCP_RUN_SERVICE" \
            --project "$GCP_PROJECT_ID" \
            --region "$GCP_REGION" \
            --format='value(status.url)'

      - name: Smoke test deployed MS3
        run: |
          SERVICE_URL="$(gcloud run services describe "$GCP_RUN_SERVICE" \
            --project "$GCP_PROJECT_ID" \
            --region "$GCP_REGION" \
            --format='value(status.url)')"
          curl -fsS "$SERVICE_URL/health"
