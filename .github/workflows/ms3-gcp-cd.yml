name: MS3 GCP CD

on:
  push:
    branches:
      - main
    paths:
      - "ms3/**"
      - ".github/workflows/ms3-gcp-cd.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  MS3_GCP_PROJECT_ID: ${{ vars.MS3_GCP_PROJECT_ID }}
  MS3_GCP_REGION: ${{ vars.MS3_GCP_REGION || 'us-central1' }}
  MS3_CLOUD_RUN_SERVICE: ${{ vars.MS3_CLOUD_RUN_SERVICE || 'ms3-activos-fijos' }}
  MS3_MS1_GRAPHQL_URL: ${{ vars.MS3_MS1_GRAPHQL_URL }}
  MS3_MS1_TICKETS_URL: ${{ vars.MS3_MS1_TICKETS_URL }}
  MS3_MS2_BASE_URL: ${{ vars.MS3_MS2_BASE_URL }}
  MS3_CORS_ORIGINS: ${{ vars.MS3_CORS_ORIGINS || '*' }}
  MS3_SENDGRID_FROM_EMAIL: ${{ vars.MS3_SENDGRID_FROM_EMAIL || 'noreply@activos.empresa.com' }}
  MS3_MS4_N8N_WEBHOOK_URL: ${{ vars.MS3_MS4_N8N_WEBHOOK_URL }}
  MS3_EMAIL_PROVIDER: ${{ vars.MS3_EMAIL_PROVIDER || 'smtp' }}
  MS3_SMTP_HOST: ${{ vars.MS3_SMTP_HOST || 'smtp.gmail.com' }}
  MS3_SMTP_PORT: ${{ vars.MS3_SMTP_PORT || '587' }}
  MS3_SMTP_SECURE: ${{ vars.MS3_SMTP_SECURE || 'false' }}
  MS3_SMTP_USER: ${{ vars.MS3_SMTP_USER }}
  MS3_SMTP_FROM_EMAIL: ${{ vars.MS3_SMTP_FROM_EMAIL || vars.MS3_SMTP_USER }}
  MS3_WHATSAPP_PROVIDER: ${{ vars.MS3_WHATSAPP_PROVIDER || 'twilio' }}
  MS3_WHATSAPP_API_URL: ${{ vars.MS3_WHATSAPP_API_URL || 'https://graph.facebook.com/v18.0' }}
  MS3_WHATSAPP_PHONE_NUMBER_ID: ${{ vars.MS3_WHATSAPP_PHONE_NUMBER_ID }}
  MS3_WHATSAPP_VERIFY_TOKEN: ${{ vars.MS3_WHATSAPP_VERIFY_TOKEN || 'activos-ms3-verify' }}
  MS3_WAHA_BASE_URL: ${{ vars.MS3_WAHA_BASE_URL || 'http://localhost:3001' }}
  MS3_WAHA_SESSION: ${{ vars.MS3_WAHA_SESSION || 'default' }}
  MS3_TWILIO_ACCOUNT_SID: ${{ vars.MS3_TWILIO_ACCOUNT_SID }}
  MS3_TWILIO_WHATSAPP_FROM: ${{ vars.MS3_TWILIO_WHATSAPP_FROM || 'whatsapp:+14155238886' }}
  MS3_FCM_PROJECT_ID: ${{ vars.MS3_FCM_PROJECT_ID }}
  MS3_AZURE_OPENAI_ENDPOINT: ${{ vars.MS3_AZURE_OPENAI_ENDPOINT }}
  MS3_AZURE_OPENAI_DEPLOYMENT: ${{ vars.MS3_AZURE_OPENAI_DEPLOYMENT || 'whatsapp-agent-mini' }}
  MS3_AZURE_OPENAI_API_VERSION: ${{ vars.MS3_AZURE_OPENAI_API_VERSION || '2025-01-01-preview' }}

jobs:
  test:
    name: Test MS3
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ms3

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js 20
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ms3/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --runInBand

      - name: Build
        run: npm run build

  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: test
    environment: production
    concurrency:
      group: ms3-production
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate deployment configuration
        env:
          MS3_GCP_SA_KEY: ${{ secrets.MS3_GCP_SA_KEY }}
          MS3_SMTP_PASSWORD: ${{ secrets.MS3_SMTP_PASSWORD }}
          MS3_TWILIO_AUTH_TOKEN: ${{ secrets.MS3_TWILIO_AUTH_TOKEN }}
          MS3_WHATSAPP_TOKEN: ${{ secrets.MS3_WHATSAPP_TOKEN }}
          MS3_WHATSAPP_APP_SECRET: ${{ secrets.MS3_WHATSAPP_APP_SECRET }}
          MS3_WAHA_API_KEY: ${{ secrets.MS3_WAHA_API_KEY }}
          MS3_SENDGRID_API_KEY: ${{ secrets.MS3_SENDGRID_API_KEY }}
          MS3_FCM_ACCESS_TOKEN: ${{ secrets.MS3_FCM_ACCESS_TOKEN }}
          MS3_AZURE_OPENAI_API_KEY: ${{ secrets.MS3_AZURE_OPENAI_API_KEY }}
        run: |
          test -n "$MS3_GCP_SA_KEY" || { echo "::error::MS3_GCP_SA_KEY secret is required"; exit 1; }
          test -n "$MS3_GCP_PROJECT_ID" || { echo "::error::MS3_GCP_PROJECT_ID variable is required"; exit 1; }
          test -n "$MS3_MS1_GRAPHQL_URL" || { echo "::error::MS3_MS1_GRAPHQL_URL variable is required"; exit 1; }
          test -n "$MS3_MS2_BASE_URL" || { echo "::error::MS3_MS2_BASE_URL variable is required"; exit 1; }
          test -n "$MS3_MS4_N8N_WEBHOOK_URL" || { echo "::error::MS3_MS4_N8N_WEBHOOK_URL variable is required"; exit 1; }
          test -n "$MS3_AZURE_OPENAI_ENDPOINT" || { echo "::error::MS3_AZURE_OPENAI_ENDPOINT variable is required"; exit 1; }
          test -n "$MS3_AZURE_OPENAI_DEPLOYMENT" || { echo "::error::MS3_AZURE_OPENAI_DEPLOYMENT variable is required"; exit 1; }
          test -n "$MS3_AZURE_OPENAI_API_KEY" || { echo "::error::MS3_AZURE_OPENAI_API_KEY secret is required"; exit 1; }
          if [ "$MS3_EMAIL_PROVIDER" = "smtp" ]; then
            test -n "$MS3_SMTP_HOST" || { echo "::error::MS3_SMTP_HOST variable is required when MS3_EMAIL_PROVIDER=smtp"; exit 1; }
            test -n "$MS3_SMTP_USER" || { echo "::error::MS3_SMTP_USER variable is required when MS3_EMAIL_PROVIDER=smtp"; exit 1; }
            test -n "$MS3_SMTP_PASSWORD" || { echo "::error::MS3_SMTP_PASSWORD secret is required when MS3_EMAIL_PROVIDER=smtp"; exit 1; }
          fi
          if [ "$MS3_EMAIL_PROVIDER" = "sendgrid" ]; then
            test -n "$MS3_SENDGRID_API_KEY" || { echo "::error::MS3_SENDGRID_API_KEY secret is required when MS3_EMAIL_PROVIDER=sendgrid"; exit 1; }
          fi
          if [ "$MS3_WHATSAPP_PROVIDER" = "twilio" ]; then
            test -n "$MS3_TWILIO_ACCOUNT_SID" || { echo "::error::MS3_TWILIO_ACCOUNT_SID variable is required when MS3_WHATSAPP_PROVIDER=twilio"; exit 1; }
            test -n "$MS3_TWILIO_AUTH_TOKEN" || { echo "::error::MS3_TWILIO_AUTH_TOKEN secret is required when MS3_WHATSAPP_PROVIDER=twilio"; exit 1; }
            test -n "$MS3_TWILIO_WHATSAPP_FROM" || { echo "::error::MS3_TWILIO_WHATSAPP_FROM variable is required when MS3_WHATSAPP_PROVIDER=twilio"; exit 1; }
          fi
          if [ "$MS3_WHATSAPP_PROVIDER" = "meta" ]; then
            test -n "$MS3_WHATSAPP_PHONE_NUMBER_ID" || { echo "::error::MS3_WHATSAPP_PHONE_NUMBER_ID variable is required when MS3_WHATSAPP_PROVIDER=meta"; exit 1; }
            test -n "$MS3_WHATSAPP_TOKEN" || { echo "::error::MS3_WHATSAPP_TOKEN secret is required when MS3_WHATSAPP_PROVIDER=meta"; exit 1; }
            test -n "$MS3_WHATSAPP_APP_SECRET" || { echo "::error::MS3_WHATSAPP_APP_SECRET secret is required when MS3_WHATSAPP_PROVIDER=meta"; exit 1; }
          fi

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.MS3_GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy MS3 to Cloud Run
        env:
          MS3_MS2_AUTH_TOKEN: ${{ secrets.MS3_MS2_AUTH_TOKEN }}
          MS3_MS1_AUTH_TOKEN: ${{ secrets.MS3_MS1_AUTH_TOKEN }}
          MS3_SMTP_PASSWORD: ${{ secrets.MS3_SMTP_PASSWORD }}
          MS3_TWILIO_AUTH_TOKEN: ${{ secrets.MS3_TWILIO_AUTH_TOKEN }}
          MS3_WHATSAPP_TOKEN: ${{ secrets.MS3_WHATSAPP_TOKEN }}
          MS3_WHATSAPP_APP_SECRET: ${{ secrets.MS3_WHATSAPP_APP_SECRET }}
          MS3_WAHA_API_KEY: ${{ secrets.MS3_WAHA_API_KEY }}
          MS3_SENDGRID_API_KEY: ${{ secrets.MS3_SENDGRID_API_KEY }}
          MS3_FCM_ACCESS_TOKEN: ${{ secrets.MS3_FCM_ACCESS_TOKEN }}
          MS3_AZURE_OPENAI_API_KEY: ${{ secrets.MS3_AZURE_OPENAI_API_KEY }}
        run: |
          gcloud run deploy "$MS3_CLOUD_RUN_SERVICE" \
            --source ms3 \
            --project "$MS3_GCP_PROJECT_ID" \
            --region "$MS3_GCP_REGION" \
            --allow-unauthenticated \
            --min-instances=0 \
            --max-instances=1 \
            --cpu=1 \
            --memory=512Mi \
            --concurrency=20 \
            --timeout=60 \
            --cpu-throttling \
            --no-cpu-boost \
            --set-env-vars "^|^MS3_NODE_ENV=production|MS3_DEV_TOOLS_ENABLED=false|MS3_PORT=8080|MS3_CORS_ORIGINS=${MS3_CORS_ORIGINS}|MS3_MS1_GRAPHQL_URL=${MS3_MS1_GRAPHQL_URL}|MS3_MS1_AUTH_TOKEN=${MS3_MS1_AUTH_TOKEN}|MS3_MS1_TICKETS_URL=${MS3_MS1_TICKETS_URL}|MS3_MS2_BASE_URL=${MS3_MS2_BASE_URL}|MS3_MS2_AUTH_TOKEN=${MS3_MS2_AUTH_TOKEN}|MS3_MS4_N8N_WEBHOOK_URL=${MS3_MS4_N8N_WEBHOOK_URL}|MS3_EMAIL_PROVIDER=${MS3_EMAIL_PROVIDER}|MS3_SMTP_HOST=${MS3_SMTP_HOST}|MS3_SMTP_PORT=${MS3_SMTP_PORT}|MS3_SMTP_SECURE=${MS3_SMTP_SECURE}|MS3_SMTP_USER=${MS3_SMTP_USER}|MS3_SMTP_PASSWORD=${MS3_SMTP_PASSWORD}|MS3_SMTP_FROM_EMAIL=${MS3_SMTP_FROM_EMAIL}|MS3_WHATSAPP_PROVIDER=${MS3_WHATSAPP_PROVIDER}|MS3_WHATSAPP_API_URL=${MS3_WHATSAPP_API_URL}|MS3_WHATSAPP_PHONE_NUMBER_ID=${MS3_WHATSAPP_PHONE_NUMBER_ID}|MS3_WHATSAPP_TOKEN=${MS3_WHATSAPP_TOKEN}|MS3_WHATSAPP_APP_SECRET=${MS3_WHATSAPP_APP_SECRET}|MS3_WHATSAPP_VERIFY_TOKEN=${MS3_WHATSAPP_VERIFY_TOKEN}|MS3_WAHA_BASE_URL=${MS3_WAHA_BASE_URL}|MS3_WAHA_SESSION=${MS3_WAHA_SESSION}|MS3_WAHA_API_KEY=${MS3_WAHA_API_KEY}|MS3_TWILIO_ACCOUNT_SID=${MS3_TWILIO_ACCOUNT_SID}|MS3_TWILIO_AUTH_TOKEN=${MS3_TWILIO_AUTH_TOKEN}|MS3_TWILIO_WHATSAPP_FROM=${MS3_TWILIO_WHATSAPP_FROM}|MS3_SENDGRID_API_KEY=${MS3_SENDGRID_API_KEY}|MS3_SENDGRID_FROM_EMAIL=${MS3_SENDGRID_FROM_EMAIL}|MS3_FCM_PROJECT_ID=${MS3_FCM_PROJECT_ID}|MS3_FCM_ACCESS_TOKEN=${MS3_FCM_ACCESS_TOKEN}|MS3_AZURE_OPENAI_ENDPOINT=${MS3_AZURE_OPENAI_ENDPOINT}|MS3_AZURE_OPENAI_DEPLOYMENT=${MS3_AZURE_OPENAI_DEPLOYMENT}|MS3_AZURE_OPENAI_API_VERSION=${MS3_AZURE_OPENAI_API_VERSION}|MS3_AZURE_OPENAI_API_KEY=${MS3_AZURE_OPENAI_API_KEY}"

      - name: Show deployed URL
        id: service-url
        run: |
          gcloud run services describe "$MS3_CLOUD_RUN_SERVICE" \
            --project "$MS3_GCP_PROJECT_ID" \
            --region "$MS3_GCP_REGION" \
            --format='value(status.url)'

      - name: Smoke test deployed MS3
        run: |
          SERVICE_URL="$(gcloud run services describe "$MS3_CLOUD_RUN_SERVICE" \
            --project "$MS3_GCP_PROJECT_ID" \
            --region "$MS3_GCP_REGION" \
            --format='value(status.url)')"
          curl -fsS "$SERVICE_URL/health"
