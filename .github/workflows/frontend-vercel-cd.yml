name: Frontend Vercel CD

on:
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-vercel-cd.yml"
  pull_request:
    branches:
      - main
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-vercel-cd.yml"
  workflow_dispatch:

permissions:
  contents: read

env:
  FRONTEND_MS1_GRAPHQL_URL: ${{ vars.FRONTEND_MS1_GRAPHQL_URL || vars.MS1_GRAPHQL_URL }}
  FRONTEND_MS1_AUTH_URL: ${{ vars.FRONTEND_MS1_AUTH_URL }}
  FRONTEND_MS2_BASE_URL: ${{ vars.FRONTEND_MS2_BASE_URL || vars.MS2_BASE_URL }}
  FRONTEND_MS3_BASE_URL: ${{ vars.FRONTEND_MS3_BASE_URL || vars.MS3_BASE_URL }}

jobs:
  build:
    name: Build frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js 20
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate production environment
        run: |
          test -n "$FRONTEND_MS1_GRAPHQL_URL" || { echo "::error::FRONTEND_MS1_GRAPHQL_URL or MS1_GRAPHQL_URL variable is required"; exit 1; }
          test -n "$FRONTEND_MS1_AUTH_URL" || { echo "::error::FRONTEND_MS1_AUTH_URL variable is required"; exit 1; }
          test -n "$FRONTEND_MS2_BASE_URL" || { echo "::error::FRONTEND_MS2_BASE_URL or MS2_BASE_URL variable is required"; exit 1; }
          test -n "$FRONTEND_MS3_BASE_URL" || { echo "::error::FRONTEND_MS3_BASE_URL or MS3_BASE_URL variable is required"; exit 1; }
          cat > src/environments/environment.prod.ts <<EOF
          export const environment = {
            production: true,
            ms1GraphqlUrl: '$FRONTEND_MS1_GRAPHQL_URL',
            ms1AuthUrl: '$FRONTEND_MS1_AUTH_URL',
            ms2BaseUrl: '$FRONTEND_MS2_BASE_URL',
            ms3BaseUrl: '$FRONTEND_MS3_BASE_URL',
          };
          EOF

      - name: Build
        run: npm run build

  deploy:
    name: Deploy frontend
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request'
    environment: production
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js 20
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate production environment
        run: |
          test -n "$FRONTEND_MS1_GRAPHQL_URL" || { echo "::error::FRONTEND_MS1_GRAPHQL_URL or MS1_GRAPHQL_URL variable is required"; exit 1; }
          test -n "$FRONTEND_MS1_AUTH_URL" || { echo "::error::FRONTEND_MS1_AUTH_URL variable is required"; exit 1; }
          test -n "$FRONTEND_MS2_BASE_URL" || { echo "::error::FRONTEND_MS2_BASE_URL or MS2_BASE_URL variable is required"; exit 1; }
          test -n "$FRONTEND_MS3_BASE_URL" || { echo "::error::FRONTEND_MS3_BASE_URL or MS3_BASE_URL variable is required"; exit 1; }
          cat > src/environments/environment.prod.ts <<EOF
          export const environment = {
            production: true,
            ms1GraphqlUrl: '$FRONTEND_MS1_GRAPHQL_URL',
            ms1AuthUrl: '$FRONTEND_MS1_AUTH_URL',
            ms2BaseUrl: '$FRONTEND_MS2_BASE_URL',
            ms3BaseUrl: '$FRONTEND_MS3_BASE_URL',
          };
          EOF

      - name: Validate Vercel configuration
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          test -n "$VERCEL_TOKEN" || { echo "::error::VERCEL_TOKEN secret is required"; exit 1; }
          test -n "$VERCEL_ORG_ID" || { echo "::error::VERCEL_ORG_ID secret is required"; exit 1; }
          test -n "$VERCEL_PROJECT_ID" || { echo "::error::VERCEL_PROJECT_ID secret is required"; exit 1; }

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          npm install --global vercel@latest
          vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
          vercel build --prod --token="$VERCEL_TOKEN"
          vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
