name: MS1 Azure CD

on:
  push:
    branches:
      - main
    paths:
      - "ms1/**"
      - ".github/workflows/ms1-azure-cd.yml"
  pull_request:
    branches:
      - main
    paths:
      - "ms1/**"
      - ".github/workflows/ms1-azure-cd.yml"
  workflow_dispatch:

permissions:
  contents: read

env:
  IMAGE_NAME: ${{ vars.MS1_IMAGE_NAME || 'ms1-activos' }}

jobs:
  test:
    name: Test MS1
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ms1

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run tests
        run: ./gradlew test --no-daemon

  build-and-deploy:
    name: Build image and deploy
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name != 'pull_request'
    environment: production
    concurrency:
      group: ms1-production
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate deployment configuration
        env:
          ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
          ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
          ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
          MS1_VM_HOST: ${{ secrets.MS1_VM_HOST }}
          MS1_VM_USER: ${{ secrets.MS1_VM_USER }}
          MS1_VM_SSH_KEY: ${{ secrets.MS1_VM_SSH_KEY }}
          MS1_SPRING_DATASOURCE_URL: ${{ vars.MS1_SPRING_DATASOURCE_URL }}
          MS1_SPRING_DATASOURCE_USERNAME: ${{ vars.MS1_SPRING_DATASOURCE_USERNAME }}
          MS1_SPRING_DATASOURCE_PASSWORD: ${{ secrets.MS1_SPRING_DATASOURCE_PASSWORD }}
          MS1_POSTGRES_PASSWORD: ${{ secrets.MS1_POSTGRES_PASSWORD }}
          MS1_ADMIN_PASSWORD: ${{ secrets.MS1_ADMIN_PASSWORD }}
          MS1_JWT_SECRET: ${{ secrets.MS1_JWT_SECRET }}
          MS1_BLOCKCHAIN_RPC_URL: ${{ vars.MS1_BLOCKCHAIN_RPC_URL }}
          MS1_BLOCKCHAIN_PRIVATE_KEY: ${{ secrets.MS1_BLOCKCHAIN_PRIVATE_KEY }}
          MS1_MS3_WEBHOOK_URL: ${{ vars.MS1_MS3_WEBHOOK_URL }}
        run: |
          test -n "$ACR_LOGIN_SERVER" || { echo "::error::ACR_LOGIN_SERVER secret is required"; exit 1; }
          test -n "$ACR_USERNAME" || { echo "::error::ACR_USERNAME secret is required"; exit 1; }
          test -n "$ACR_PASSWORD" || { echo "::error::ACR_PASSWORD secret is required"; exit 1; }
          test -n "$MS1_VM_HOST" || { echo "::error::MS1_VM_HOST secret is required"; exit 1; }
          test -n "$MS1_VM_USER" || { echo "::error::MS1_VM_USER secret is required"; exit 1; }
          test -n "$MS1_VM_SSH_KEY" || { echo "::error::MS1_VM_SSH_KEY secret is required"; exit 1; }
          test -n "$MS1_SPRING_DATASOURCE_URL" || { echo "::error::MS1_SPRING_DATASOURCE_URL variable is required"; exit 1; }
          test -n "$MS1_SPRING_DATASOURCE_USERNAME" || { echo "::error::MS1_SPRING_DATASOURCE_USERNAME variable is required"; exit 1; }
          test -n "$MS1_SPRING_DATASOURCE_PASSWORD" || { echo "::error::MS1_SPRING_DATASOURCE_PASSWORD secret is required"; exit 1; }
          test -n "$MS1_POSTGRES_PASSWORD" || { echo "::error::MS1_POSTGRES_PASSWORD secret is required"; exit 1; }
          test -n "$MS1_ADMIN_PASSWORD" || { echo "::error::MS1_ADMIN_PASSWORD secret is required"; exit 1; }
          test -n "$MS1_JWT_SECRET" || { echo "::error::MS1_JWT_SECRET secret is required"; exit 1; }
          test -n "$MS1_BLOCKCHAIN_RPC_URL" || { echo "::error::MS1_BLOCKCHAIN_RPC_URL variable is required"; exit 1; }
          test -n "$MS1_BLOCKCHAIN_PRIVATE_KEY" || { echo "::error::MS1_BLOCKCHAIN_PRIVATE_KEY secret is required"; exit 1; }
          test -n "$MS1_MS3_WEBHOOK_URL" || { echo "::error::MS1_MS3_WEBHOOK_URL variable is required"; exit 1; }

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push MS1 image
        uses: docker/build-push-action@v6
        with:
          context: ./ms1
          target: runtime
          push: true
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest

      - name: Deploy container to Azure VM
        env:
          ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
          ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
          ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
          MS1_VM_HOST: ${{ secrets.MS1_VM_HOST }}
          MS1_VM_USER: ${{ secrets.MS1_VM_USER }}
          MS1_VM_SSH_KEY: ${{ secrets.MS1_VM_SSH_KEY }}
          IMAGE_TAG: ${{ github.sha }}
          MS1_POSTGRES_DB: ${{ vars.MS1_POSTGRES_DB || 'activos_db' }}
          MS1_POSTGRES_USER: ${{ vars.MS1_POSTGRES_USER || 'activos_user' }}
          MS1_POSTGRES_PASSWORD: ${{ secrets.MS1_POSTGRES_PASSWORD }}
          MS1_SPRING_DATASOURCE_URL: ${{ vars.MS1_SPRING_DATASOURCE_URL }}
          MS1_SPRING_DATASOURCE_USERNAME: ${{ vars.MS1_SPRING_DATASOURCE_USERNAME }}
          MS1_SPRING_DATASOURCE_PASSWORD: ${{ secrets.MS1_SPRING_DATASOURCE_PASSWORD }}
          MS1_DB_SCHEMA: ${{ vars.MS1_DB_SCHEMA || 'public' }}
          MS1_DB_PREPARE_THRESHOLD: ${{ vars.MS1_DB_PREPARE_THRESHOLD || '0' }}
          MS1_DB_POOL_MAX_SIZE: ${{ vars.MS1_DB_POOL_MAX_SIZE || '10' }}
          MS1_DB_POOL_MIN_IDLE: ${{ vars.MS1_DB_POOL_MIN_IDLE || '2' }}
          MS1_DB_POOL_CONNECTION_TIMEOUT_MS: ${{ vars.MS1_DB_POOL_CONNECTION_TIMEOUT_MS || '30000' }}
          MS1_DB_POOL_IDLE_TIMEOUT_MS: ${{ vars.MS1_DB_POOL_IDLE_TIMEOUT_MS || '300000' }}
          MS1_DB_POOL_MAX_LIFETIME_MS: ${{ vars.MS1_DB_POOL_MAX_LIFETIME_MS || '600000' }}
          MS1_FLYWAY_CONNECT_RETRIES: ${{ vars.MS1_FLYWAY_CONNECT_RETRIES || '10' }}
          MS1_FLYWAY_CONNECT_RETRIES_INTERVAL: ${{ vars.MS1_FLYWAY_CONNECT_RETRIES_INTERVAL || '5s' }}
          MS1_SPRING_JPA_HIBERNATE_DDL_AUTO: ${{ vars.MS1_SPRING_JPA_HIBERNATE_DDL_AUTO || 'validate' }}
          MS1_ADMIN_USER: ${{ vars.MS1_ADMIN_USER || 'admin' }}
          MS1_ADMIN_PASSWORD: ${{ secrets.MS1_ADMIN_PASSWORD }}
          MS1_JWT_SECRET: ${{ secrets.MS1_JWT_SECRET }}
          MS1_BLOCKCHAIN_RPC_URL: ${{ vars.MS1_BLOCKCHAIN_RPC_URL }}
          MS1_BLOCKCHAIN_PRIVATE_KEY: ${{ secrets.MS1_BLOCKCHAIN_PRIVATE_KEY }}
          MS1_MS3_WEBHOOK_URL: ${{ vars.MS1_MS3_WEBHOOK_URL }}
          MS1_CORS_ALLOWED_ORIGIN_PATTERNS: ${{ vars.MS1_CORS_ALLOWED_ORIGIN_PATTERNS || '*' }}
          MS1_DOMAIN: ${{ vars.MS1_DOMAIN }}
          MS1_HTTP_PORT: ${{ vars.MS1_HTTP_PORT || '80' }}
          MS1_HTTPS_PORT: ${{ vars.MS1_HTTPS_PORT || '443' }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$MS1_VM_SSH_KEY" > ~/.ssh/ms1_vm_key
          chmod 600 ~/.ssh/ms1_vm_key
          ssh-keyscan -H "$MS1_VM_HOST" >> ~/.ssh/known_hosts

          {
            printf 'MS1_IMAGE=%s/%s:%s\n' "$ACR_LOGIN_SERVER" "$IMAGE_NAME" "$IMAGE_TAG"
            printf 'MS1_POSTGRES_DB=%s\n' "$MS1_POSTGRES_DB"
            printf 'MS1_POSTGRES_USER=%s\n' "$MS1_POSTGRES_USER"
            printf 'MS1_POSTGRES_PASSWORD=%s\n' "$MS1_POSTGRES_PASSWORD"
            printf 'MS1_SPRING_DATASOURCE_URL=%s\n' "$MS1_SPRING_DATASOURCE_URL"
            printf 'MS1_SPRING_DATASOURCE_USERNAME=%s\n' "$MS1_SPRING_DATASOURCE_USERNAME"
            printf 'MS1_SPRING_DATASOURCE_PASSWORD=%s\n' "$MS1_SPRING_DATASOURCE_PASSWORD"
            printf 'MS1_DB_SCHEMA=%s\n' "$MS1_DB_SCHEMA"
            printf 'MS1_DB_PREPARE_THRESHOLD=%s\n' "$MS1_DB_PREPARE_THRESHOLD"
            printf 'MS1_DB_POOL_MAX_SIZE=%s\n' "$MS1_DB_POOL_MAX_SIZE"
            printf 'MS1_DB_POOL_MIN_IDLE=%s\n' "$MS1_DB_POOL_MIN_IDLE"
            printf 'MS1_DB_POOL_CONNECTION_TIMEOUT_MS=%s\n' "$MS1_DB_POOL_CONNECTION_TIMEOUT_MS"
            printf 'MS1_DB_POOL_IDLE_TIMEOUT_MS=%s\n' "$MS1_DB_POOL_IDLE_TIMEOUT_MS"
            printf 'MS1_DB_POOL_MAX_LIFETIME_MS=%s\n' "$MS1_DB_POOL_MAX_LIFETIME_MS"
            printf 'MS1_FLYWAY_CONNECT_RETRIES=%s\n' "$MS1_FLYWAY_CONNECT_RETRIES"
            printf 'MS1_FLYWAY_CONNECT_RETRIES_INTERVAL=%s\n' "$MS1_FLYWAY_CONNECT_RETRIES_INTERVAL"
            printf 'MS1_SPRING_JPA_HIBERNATE_DDL_AUTO=%s\n' "$MS1_SPRING_JPA_HIBERNATE_DDL_AUTO"
            printf 'MS1_ADMIN_USER=%s\n' "$MS1_ADMIN_USER"
            printf 'MS1_ADMIN_PASSWORD=%s\n' "$MS1_ADMIN_PASSWORD"
            printf 'MS1_JWT_SECRET=%s\n' "$MS1_JWT_SECRET"
            printf 'MS1_BLOCKCHAIN_RPC_URL=%s\n' "$MS1_BLOCKCHAIN_RPC_URL"
            printf 'MS1_BLOCKCHAIN_PRIVATE_KEY=%s\n' "$MS1_BLOCKCHAIN_PRIVATE_KEY"
            printf 'MS1_MS3_WEBHOOK_URL=%s\n' "$MS1_MS3_WEBHOOK_URL"
            printf 'MS1_CORS_ALLOWED_ORIGIN_PATTERNS=%s\n' "$MS1_CORS_ALLOWED_ORIGIN_PATTERNS"
            printf 'MS1_DOMAIN=%s\n' "$MS1_DOMAIN"
            printf 'MS1_HTTP_PORT=%s\n' "$MS1_HTTP_PORT"
            printf 'MS1_HTTPS_PORT=%s\n' "$MS1_HTTPS_PORT"
          } > .env.deploy

          ssh -i ~/.ssh/ms1_vm_key "$MS1_VM_USER@$MS1_VM_HOST" 'mkdir -p /opt/ms1'
          scp -i ~/.ssh/ms1_vm_key ms1/docker-compose.prod.yml "$MS1_VM_USER@$MS1_VM_HOST:/opt/ms1/docker-compose.yml"
          scp -i ~/.ssh/ms1_vm_key .env.deploy "$MS1_VM_USER@$MS1_VM_HOST:/opt/ms1/.env"

          printf '%s\n' "$ACR_PASSWORD" | ssh -i ~/.ssh/ms1_vm_key "$MS1_VM_USER@$MS1_VM_HOST" \
            "docker login '$ACR_LOGIN_SERVER' --username '$ACR_USERNAME' --password-stdin"

          ssh -i ~/.ssh/ms1_vm_key "$MS1_VM_USER@$MS1_VM_HOST" \
            "cd /opt/ms1 \
            && docker compose --env-file .env -f docker-compose.yml pull \
            && docker compose --env-file .env -f docker-compose.yml up -d --remove-orphans"
