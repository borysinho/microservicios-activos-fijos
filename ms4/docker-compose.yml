services:
  ms4-n8n:
    build: .
    container_name: activos-ms4-n8n
    ports:
      - "${MS4_N8N_PORT:-5678}:5678"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - .env
    environment:
      N8N_HOST: localhost
      N8N_PORT: ${MS4_N8N_PORT:-5678}
      N8N_PROTOCOL: http
      WEBHOOK_URL: http://localhost:5678
      N8N_EDITOR_BASE_URL: http://localhost:5678
      N8N_ENCRYPTION_KEY: ${MS4_N8N_ENCRYPTION_KEY}
      N8N_BASIC_AUTH_ACTIVE: ${MS4_N8N_BASIC_AUTH_ACTIVE:-true}
      N8N_BASIC_AUTH_USER: ${MS4_N8N_BASIC_AUTH_USER}
      N8N_BASIC_AUTH_PASSWORD: ${MS4_N8N_BASIC_AUTH_PASSWORD}
      N8N_IMPORT_WORKFLOWS: ${MS4_N8N_IMPORT_WORKFLOWS:-true}
      N8N_IMPORT_WORKFLOWS_MARKER: ${MS4_N8N_IMPORT_WORKFLOWS_MARKER:-/home/node/.n8n/.ms4-workflows-imported}
      N8N_FORCE_IMPORT_WORKFLOWS: ${MS4_N8N_FORCE_IMPORT_WORKFLOWS:-false}
      N8N_DIAGNOSTICS_ENABLED: ${MS4_N8N_DIAGNOSTICS_ENABLED:-false}
      N8N_VERSION_NOTIFICATIONS_ENABLED: ${MS4_N8N_VERSION_NOTIFICATIONS_ENABLED:-false}
      N8N_TEMPLATES_ENABLED: ${MS4_N8N_TEMPLATES_ENABLED:-false}
      N8N_PERSONALIZATION_ENABLED: ${MS4_N8N_PERSONALIZATION_ENABLED:-false}
      MS4_MS1_GRAPHQL_URL: http://host.docker.internal:8081/graphql
      MS4_MS2_BASE_URL: http://host.docker.internal:8002/api
      MS4_MS3_BASE_URL: http://host.docker.internal:3000/api
      MS4_FCM_API_URL: ${MS4_FCM_API_URL:-}
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n-workflows:/workflows:ro

volumes:
  n8n_data:
