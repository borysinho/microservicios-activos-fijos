services:
  ms4-n8n:
    build: .
    container_name: activos-ms4-n8n
    ports:
      - "5678:5678"
    env_file:
      - .env
    environment:
      N8N_HOST: localhost
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      WEBHOOK_URL: http://localhost:5678
      N8N_EDITOR_BASE_URL: http://localhost:5678
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n-workflows:/workflows:ro

volumes:
  n8n_data:
