services:
  postgres:
    image: postgres:16-alpine
    container_name: ms1-postgres-prod
    environment:
      POSTGRES_DB: ${MS1_POSTGRES_DB:-activos_db}
      POSTGRES_USER: ${MS1_POSTGRES_USER:-activos_user}
      POSTGRES_PASSWORD: ${MS1_POSTGRES_PASSWORD:?MS1_POSTGRES_PASSWORD requerida}
    volumes:
      - ms1_pgdata_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${MS1_POSTGRES_USER:-activos_user} -d ${MS1_POSTGRES_DB:-activos_db}"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped
    networks:
      - ms1_prod_net

  ms1:
    image: ${MS1_IMAGE:-ms1-activos:prod}
    container_name: ms1-activos-prod
    environment:
      MS1_SPRING_DATASOURCE_URL: ${MS1_SPRING_DATASOURCE_URL:-jdbc:postgresql://postgres:5432/activos_db}
      MS1_SPRING_DATASOURCE_USERNAME: ${MS1_SPRING_DATASOURCE_USERNAME:-activos_user}
      MS1_SPRING_DATASOURCE_PASSWORD: ${MS1_SPRING_DATASOURCE_PASSWORD:?MS1_SPRING_DATASOURCE_PASSWORD requerida}
      MS1_DB_SCHEMA: ${MS1_DB_SCHEMA:-public}
      MS1_DB_PREPARE_THRESHOLD: ${MS1_DB_PREPARE_THRESHOLD:-0}
      MS1_DB_POOL_MAX_SIZE: ${MS1_DB_POOL_MAX_SIZE:-10}
      MS1_DB_POOL_MIN_IDLE: ${MS1_DB_POOL_MIN_IDLE:-2}
      MS1_DB_POOL_CONNECTION_TIMEOUT_MS: ${MS1_DB_POOL_CONNECTION_TIMEOUT_MS:-30000}
      MS1_DB_POOL_IDLE_TIMEOUT_MS: ${MS1_DB_POOL_IDLE_TIMEOUT_MS:-300000}
      MS1_DB_POOL_MAX_LIFETIME_MS: ${MS1_DB_POOL_MAX_LIFETIME_MS:-600000}
      MS1_FLYWAY_CONNECT_RETRIES: ${MS1_FLYWAY_CONNECT_RETRIES:-10}
      MS1_FLYWAY_CONNECT_RETRIES_INTERVAL: ${MS1_FLYWAY_CONNECT_RETRIES_INTERVAL:-5s}
      MS1_SPRING_JPA_HIBERNATE_DDL_AUTO: ${MS1_SPRING_JPA_HIBERNATE_DDL_AUTO:-validate}
      MS1_ADMIN_USER: ${MS1_ADMIN_USER:-admin}
      MS1_ADMIN_PASSWORD: ${MS1_ADMIN_PASSWORD:?MS1_ADMIN_PASSWORD requerida}
      MS1_JWT_SECRET: ${MS1_JWT_SECRET:?MS1_JWT_SECRET requerida}
      MS1_BLOCKCHAIN_RPC_URL: ${MS1_BLOCKCHAIN_RPC_URL:?MS1_BLOCKCHAIN_RPC_URL requerida}
      MS1_BLOCKCHAIN_PRIVATE_KEY: ${MS1_BLOCKCHAIN_PRIVATE_KEY:?MS1_BLOCKCHAIN_PRIVATE_KEY requerida}
      MS1_MS3_WEBHOOK_URL: ${MS1_MS3_WEBHOOK_URL:?MS1_MS3_WEBHOOK_URL requerida}
      MS1_CORS_ALLOWED_ORIGIN_PATTERNS: ${MS1_CORS_ALLOWED_ORIGIN_PATTERNS:-*}
    expose:
      - "8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - ms1_prod_net

  caddy:
    image: caddy:2-alpine
    container_name: ms1-caddy-prod
    command:
      - caddy
      - reverse-proxy
      - --from
      - ${MS1_DOMAIN:-ms1-activos-fijos-bq20260710.eastus.cloudapp.azure.com}
      - --to
      - ms1:8080
    ports:
      - "${MS1_HTTP_PORT:-80}:80"
      - "${MS1_HTTPS_PORT:-443}:443"
    volumes:
      - ms1_caddy_data_prod:/data
      - ms1_caddy_config_prod:/config
    depends_on:
      - ms1
    restart: unless-stopped
    networks:
      - ms1_prod_net

volumes:
  ms1_pgdata_prod:
  ms1_caddy_data_prod:
  ms1_caddy_config_prod:

networks:
  ms1_prod_net:
    driver: bridge
