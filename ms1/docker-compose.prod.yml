services:
  postgres:
    image: postgres:16-alpine
    container_name: ms1-postgres-prod
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-activos_db}
      POSTGRES_USER: ${POSTGRES_USER:-activos_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD requerida}
    volumes:
      - ms1_pgdata_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-activos_user} -d ${POSTGRES_DB:-activos_db}"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped
    networks:
      - ms1_prod_net

  ms1:
    image: ${MS1_IMAGE:-ms1-activos:prod}
    container_name: ms1-activos-prod
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:postgresql://postgres:5432/activos_db}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-activos_user}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:?SPRING_DATASOURCE_PASSWORD requerida}
      DB_SCHEMA: ${DB_SCHEMA:-public}
      DB_PREPARE_THRESHOLD: ${DB_PREPARE_THRESHOLD:-0}
      FLYWAY_CONNECT_RETRIES: ${FLYWAY_CONNECT_RETRIES:-10}
      FLYWAY_CONNECT_RETRIES_INTERVAL: ${FLYWAY_CONNECT_RETRIES_INTERVAL:-5s}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${SPRING_JPA_HIBERNATE_DDL_AUTO:-validate}
      ADMIN_USER: ${ADMIN_USER:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD requerida}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET requerida}
      BLOCKCHAIN_RPC_URL: ${BLOCKCHAIN_RPC_URL:?BLOCKCHAIN_RPC_URL requerida}
      BLOCKCHAIN_PRIVATE_KEY: ${BLOCKCHAIN_PRIVATE_KEY:?BLOCKCHAIN_PRIVATE_KEY requerida}
      MS3_WEBHOOK_URL: ${MS3_WEBHOOK_URL:?MS3_WEBHOOK_URL requerida}
      CORS_ALLOWED_ORIGIN_PATTERNS: ${CORS_ALLOWED_ORIGIN_PATTERNS:-*}
    expose:
      - "8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - ms1_prod_net

  caddy:
    image: caddy:2-alpine
    container_name: ms1-caddy-prod
    command:
      - caddy
      - reverse-proxy
      - --from
      - ${MS1_DOMAIN:-ms1-activos-fijos-bq20260710.eastus.cloudapp.azure.com}
      - --to
      - ms1:8080
    ports:
      - "${MS1_HTTP_PORT:-80}:80"
      - "${MS1_HTTPS_PORT:-443}:443"
    volumes:
      - ms1_caddy_data_prod:/data
      - ms1_caddy_config_prod:/config
    depends_on:
      - ms1
    restart: unless-stopped
    networks:
      - ms1_prod_net

volumes:
  ms1_pgdata_prod:
  ms1_caddy_data_prod:
  ms1_caddy_config_prod:

networks:
  ms1_prod_net:
    driver: bridge
