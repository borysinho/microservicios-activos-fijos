spring:
  application:
    name: ms1-activos

  # ── Base de Datos ──────────────────────────────────────────────────
  datasource:
    url: ${MS1_SPRING_DATASOURCE_URL}
    username: ${MS1_SPRING_DATASOURCE_USERNAME}
    password: ${MS1_SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${MS1_DB_POOL_MAX_SIZE:10}
      minimum-idle: ${MS1_DB_POOL_MIN_IDLE:2}
      connection-timeout: ${MS1_DB_POOL_CONNECTION_TIMEOUT_MS:30000}
      idle-timeout: ${MS1_DB_POOL_IDLE_TIMEOUT_MS:300000}
      max-lifetime: ${MS1_DB_POOL_MAX_LIFETIME_MS:600000}
      data-source-properties:
        prepareThreshold: ${MS1_DB_PREPARE_THRESHOLD:0}

  # ── JPA / Hibernate ───────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: ${MS1_SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: ${MS1_DB_SCHEMA:public}

  # ── Flyway ────────────────────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    default-schema: ${MS1_DB_SCHEMA:public}
    schemas: ${MS1_DB_SCHEMA:public}
    connect-retries: ${MS1_FLYWAY_CONNECT_RETRIES:10}
    connect-retries-interval: ${MS1_FLYWAY_CONNECT_RETRIES_INTERVAL:5s}

  # ── GraphQL ───────────────────────────────────────────────────────
  graphql:
    graphiql:
      enabled: true
      path: /graphiql
    path: /graphql
    schema:
      locations: classpath:graphql/
      file-extensions: .graphqls

  # ── Seguridad ─────────────────────────────────────────────────────
  security:
    user:
      name: ${MS1_ADMIN_USER:admin}
      password: ${MS1_ADMIN_PASSWORD}

# ── JWT ─────────────────────────────────────────────────────────────
jwt:
  secret: ${MS1_JWT_SECRET}
  expiration: 86400000 # 24 horas en ms

# ── Servidor ────────────────────────────────────────────────────────
server:
  port: ${MS1_SERVER_PORT:8080}
  servlet:
    context-path: /

# ── Actuator ────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

# ── Blockchain ──────────────────────────────────────────────────────
blockchain:
  rpc-url: ${MS1_BLOCKCHAIN_RPC_URL}
  wallet:
    private-key: ${MS1_BLOCKCHAIN_PRIVATE_KEY}

# ── MS3 Webhook ─────────────────────────────────────────────────────
ms3:
  webhook:
    url: ${MS1_MS3_WEBHOOK_URL:http://localhost:3000/webhook/activos}

# ── CORS ─────────────────────────────────────────────────────────────
app:
  cors:
    allowed-origin-patterns: ${MS1_CORS_ALLOWED_ORIGIN_PATTERNS:*}

# ── Logging ─────────────────────────────────────────────────────────
logging:
  level:
    com.activos.ms1: INFO
    org.hibernate.SQL: WARN
    org.springframework.graphql: INFO
