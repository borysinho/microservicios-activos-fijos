services:
  postgres:
    image: postgres:16-alpine
    container_name: ms1-postgres-dev
    environment:
      POSTGRES_DB: activos_db
      POSTGRES_USER: activos_user
      POSTGRES_PASSWORD: activos_pass
    ports:
      - "${MS1_DB_PORT:-15432}:5432"
    networks:
      ms1_dev_net:
        ipv4_address: 10.251.10.2
    volumes:
      - ms1_pgdata_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U activos_user -d activos_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  ms1:
    build:
      context: .
      target: dev
    container_name: ms1-activos-dev
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://10.251.10.2:5432/activos_db
      SPRING_DATASOURCE_USERNAME: activos_user
      SPRING_DATASOURCE_PASSWORD: activos_pass
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      ADMIN_USER: ${ADMIN_USER:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin-dev}
      JWT_SECRET: ${JWT_SECRET:-clave-dev-larga-clave-dev-larga-clave-dev-larga}
      BLOCKCHAIN_RPC_URL: ${BLOCKCHAIN_RPC_URL:-https://rpc.ankr.com/eth_sepolia}
      BLOCKCHAIN_PRIVATE_KEY: ${BLOCKCHAIN_PRIVATE_KEY:-0x4f3edf983ac636a65a842ce7c78d9aa706d3b113bce7c46f30d7d21715b23b2d}
      MS3_WEBHOOK_URL: ${MS3_WEBHOOK_URL:-http://host.docker.internal:3000/webhook/activos}
      CORS_ALLOWED_ORIGIN_PATTERNS: ${CORS_ALLOWED_ORIGIN_PATTERNS:-*}
    ports:
      - "${MS1_PORT:-8081}:8080"
    volumes:
      - .:/workspace
      - ms1_gradle_cache:/root/.gradle
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      ms1_dev_net:
        ipv4_address: 10.251.10.3
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  ms1_pgdata_dev:
  ms1_gradle_cache:

networks:
  ms1_dev_net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.251.10.0/24
