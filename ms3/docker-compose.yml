services:
  ms3:
    build: .
    container_name: activos-ms3
    env_file:
      - .env
    ports:
      - "3000:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      MS3_DEV_TOOLS_ENABLED: "true"
      MS3_PORT: 3000
      MS3_MS1_GRAPHQL_URL: http://host.docker.internal:8081/graphql
      MS3_MS1_TICKETS_URL: http://host.docker.internal:8081/api/solicitudes-revision
      MS3_MS2_BASE_URL: http://host.docker.internal:8002/api
      MS3_MS4_N8N_WEBHOOK_URL: http://host.docker.internal:5678/webhook
      MS3_SENDGRID_FROM_EMAIL: noreply@activos.empresa.com
