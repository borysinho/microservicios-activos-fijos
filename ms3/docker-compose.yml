services:
  ms3:
    build: .
    container_name: activos-ms3
    ports:
      - "3000:3000"
    environment:
      MS3_DEV_TOOLS_ENABLED: "true"
      PORT: 3000
      MS1_GRAPHQL_URL: http://host.docker.internal:8081/graphql
      MS2_BASE_URL: http://host.docker.internal:8000/api
      N8N_WEBHOOK_URL: http://n8n:5678/webhook
      SENDGRID_FROM_EMAIL: noreply@activos.empresa.com
    depends_on:
      - n8n

  n8n:
    image: n8nio/n8n:1.70.3
    container_name: activos-n8n
    ports:
      - "5678:5678"
    environment:
      N8N_HOST: localhost
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      MS1_GRAPHQL_URL: http://host.docker.internal:8081/graphql
      MS2_BASE_URL: http://host.docker.internal:8000/api
      SENDGRID_FROM_EMAIL: noreply@activos.empresa.com
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n-workflows:/workflows:ro

volumes:
  n8n_data:
