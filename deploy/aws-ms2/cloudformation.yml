AWSTemplateFormatVersion: "2010-09-09"
Description: MS2 Documentos e IA - FastAPI on Lambda Function URL, S3 and DynamoDB.

Parameters:
  ProjectName:
    Type: String
    Default: activos-fijos-ms2
  ImageUri:
    Type: String
  BucketName:
    Type: String
  DocsTableName:
    Type: String
    Default: activos-fijos-ms2-documentos
  AuditTableName:
    Type: String
    Default: activos-fijos-ms2-auditoria
  JwtSecret:
    Type: String
    NoEcho: true
  JwtAlgorithm:
    Type: String
    Default: HS512
  AllowedOrigins:
    Type: String
    Default: "*"
  LoadAiModels:
    Type: String
    Default: "true"
    AllowedValues:
      - "true"
      - "false"
Resources:
  DocumentosBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Ref BucketName
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: AbortIncompleteMultipartUploads
            Status: Enabled
            AbortIncompleteMultipartUpload:
              DaysAfterInitiation: 1

  DocumentosTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Ref DocsTableName
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: activoId
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: activoId-index
          KeySchema:
            - AttributeName: activoId
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  AuditoriaTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Ref AuditTableName
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: documentoId
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: documentoId-index
          KeySchema:
            - AttributeName: documentoId
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  LambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: ms2-s3-dynamodb-access
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt DocumentosBucket.Arn
                  - !Sub "${DocumentosBucket.Arn}/*"
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:Query
                  - dynamodb:Scan
                  - dynamodb:DescribeTable
                Resource:
                  - !GetAtt DocumentosTable.Arn
                  - !Sub "${DocumentosTable.Arn}/index/*"
                  - !GetAtt AuditoriaTable.Arn
                  - !Sub "${AuditoriaTable.Arn}/index/*"

  Ms2Function:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Ref ProjectName
      PackageType: Image
      Code:
        ImageUri: !Ref ImageUri
      Role: !GetAtt LambdaRole.Arn
      MemorySize: 512
      Timeout: 30
      Architectures:
        - x86_64
      Environment:
        Variables:
          AWS_ENDPOINT_URL: ""
          AUTO_BOOTSTRAP_AWS_RESOURCES: "false"
          S3_BUCKET_NAME: !Ref BucketName
          DYNAMODB_TABLE_DOCS: !Ref DocsTableName
          DYNAMODB_TABLE_AUDITORIA: !Ref AuditTableName
          JWT_SECRET: !Ref JwtSecret
          JWT_ALGORITHM: !Ref JwtAlgorithm
          ALLOWED_ORIGINS: !Ref AllowedOrigins
          LOAD_AI_MODELS: !Ref LoadAiModels

  Ms2FunctionUrl:
    Type: AWS::Lambda::Url
    Properties:
      AuthType: NONE
      TargetFunctionArn: !GetAtt Ms2Function.Arn

  Ms2FunctionUrlPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref Ms2Function
      Action: lambda:InvokeFunctionUrl
      Principal: "*"
      FunctionUrlAuthType: NONE

  Ms2FunctionUrlInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref Ms2Function
      Action: lambda:InvokeFunction
      Principal: "*"
      InvokedViaFunctionUrl: true

Outputs:
  ApiUrl:
    Description: Base URL for MS2 Lambda Function URL.
    Value: !GetAtt Ms2FunctionUrl.FunctionUrl
  HealthUrl:
    Description: Health endpoint.
    Value: !Sub "${Ms2FunctionUrl.FunctionUrl}health"
  Bucket:
    Description: S3 bucket for documents and IA images.
    Value: !Ref DocumentosBucket
  DocsTable:
    Description: DynamoDB table for document metadata.
    Value: !Ref DocumentosTable
  AuditTable:
    Description: DynamoDB table for audit events.
    Value: !Ref AuditoriaTable
