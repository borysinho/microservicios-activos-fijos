<div class="login">
  <div class="login__bg">
    <div class="login__grid"></div>
  </div>

  <div class="login__card">
    <div class="login__brand">
      <div class="login__brand-mark">AF</div>
      <div>
        <h1 class="login__brand-name">Activos Fijos</h1>
        <p class="login__brand-sub">Sistema de Gestión Empresarial</p>
      </div>
    </div>

    <form class="login__form" (ngSubmit)="login()" #f="ngForm">
      <h2 class="login__title">Iniciar sesión</h2>
      <p class="login__subtitle">Ingrese con las credenciales asignadas por administración</p>

      @if (error()) {
        <div class="login__error">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            width="16"
            height="16"
          >
            <circle cx="12" cy="12" r="10" />
            <line x1="12" y1="8" x2="12" y2="12" />
            <line x1="12" y1="16" x2="12.01" y2="16" />
          </svg>
          {{ error() }}
        </div>
      }

      <div class="form-group">
        <label>Usuario</label>
        <input
          class="form-control"
          type="text"
          [(ngModel)]="username"
          name="username"
          placeholder="admin"
          required
          autocomplete="username"
        />
      </div>

      <div class="form-group">
        <label>Contraseña</label>
        <input
          class="form-control"
          type="password"
          [(ngModel)]="password"
          name="password"
          placeholder="••••••••"
          required
          autocomplete="current-password"
        />
      </div>

      <button class="btn btn--primary login__submit" type="submit" [disabled]="loading()">
        @if (loading()) {
          Autenticando...
        } @else {
          Ingresar al sistema
        }
      </button>

      <a class="btn btn--secondary login__manual" routerLink="/manual">
        <svg
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="1.8"
          width="15"
          height="15"
        >
          <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20" />
          <path d="M4 4.5A2.5 2.5 0 0 1 6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5z" />
          <path d="M8 7h7M8 11h8" />
        </svg>
        Ver manual de usuario
      </a>
    </form>
  </div>
</div>
